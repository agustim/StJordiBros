<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Llegenda de Sant Jordi — Montblanc 1-1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; height: 100vh;
    font-family: monospace;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game-wrapper {
    position: relative;
    container-type: inline-size;
    width: min(100vw, calc(100vh * 2));
    aspect-ratio: 2 / 1;
    overflow: hidden;
  }
  #game-wrapper canvas {
    display: block;
    width: 100%; height: 100%;
    border: 2px solid #555;
    image-rendering: pixelated;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  #touch-controls {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    touch-action: none;
  }
  #dpad {
    position: absolute;
    left: 2cqi; bottom: 2cqi;
    display: flex; gap: 1.5cqi;
    pointer-events: auto;
  }
  #action-btns {
    position: absolute;
    right: 2cqi; bottom: 2cqi;
    display: flex;
    flex-direction: column;
    gap: 1.5cqi;
    pointer-events: auto;
  }
  #fs-btn {
    position: absolute;
    top: 0; right: 0;
    width: 6cqi;
    aspect-ratio: 1;
    background: rgba(255,255,255,0.08);
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 3cqi;
    cursor: pointer;
    pointer-events: auto;
    touch-action: none;
    z-index: 5;
    border-radius: 0 0 0 50%;
    padding: 0;
    line-height: 1;
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 0.5cqi;
  }
  #fs-btn:active { background: rgba(255,255,255,0.2); }
  .touch-btn {
    width: 9cqi;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 0.25cqi solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 4cqi;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, transform 0.1s;
    padding: 0;
    line-height: 1;
  }
  .touch-btn:active, .touch-btn.pressed {
    background: rgba(255,255,255,0.3);
    transform: scale(0.92);
  }
  #btn-jump {
    background: rgba(255,200,50,0.2);
    border-color: rgba(255,200,50,0.4);
    font-size: 5cqi;
  }
  #btn-jump:active, #btn-jump.pressed {
    background: rgba(255,200,50,0.4);
  }
  #btn-sprint {
    background: rgba(255,100,50,0.15);
    border-color: rgba(255,100,50,0.35);
    font-size: 3.5cqi;
  }
  #btn-sprint:active, #btn-sprint.pressed {
    background: rgba(255,100,50,0.35);
  }
  #btn-swap {
    background: rgba(100,200,255,0.15);
    border-color: rgba(100,200,255,0.35);
    font-weight: bold;
  }
  #btn-swap:active, #btn-swap.pressed {
    background: rgba(100,200,255,0.35);
  }
  #btn-attack {
    background: rgba(255,50,50,0.15);
    border-color: rgba(255,50,50,0.35);
    font-size: 4cqi;
  }
  #btn-attack:active, #btn-attack.pressed {
    background: rgba(255,50,50,0.35);
  }
  #btn-ultimate {
    background: rgba(200,50,255,0.15);
    border-color: rgba(200,50,255,0.35);
    font-size: 4cqi;
  }
  #btn-ultimate:active, #btn-ultimate.pressed {
    background: rgba(200,50,255,0.35);
  }
  #info {
    position: fixed; bottom: 4px; left: 50%; transform: translateX(-50%);
    color: #444; font-size: clamp(8px, 1.2cqi, 11px);
    text-align: center; pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }

  /* Portrait: smaller buttons in a grid */
  @media (orientation: portrait) {
    #action-btns {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 1cqi;
      right: 1cqi; bottom: 1cqi;
    }
    .touch-btn {
      width: 6cqi;
      font-size: 2.5cqi;
    }
    #btn-jump { font-size: 3.5cqi; }
    #btn-sprint { font-size: 2.5cqi; }
    #dpad { left: 1cqi; bottom: 1cqi; gap: 1cqi; }
    #dpad .touch-btn { width: 7cqi; font-size: 3cqi; }
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="touch-controls" style="display:none">
    <div id="dpad">
      <button class="touch-btn" id="btn-left" data-key="ArrowLeft">◀</button>
      <button class="touch-btn" id="btn-right" data-key="ArrowRight">▶</button>
    </div>
    <div id="action-btns">
      <button class="touch-btn" id="btn-jump" data-key="Space">🦘</button>
      <button class="touch-btn" id="btn-sprint" data-key="ShiftLeft">⚡</button>
      <button class="touch-btn" id="btn-swap" data-key="KeyC">C</button>
      <button class="touch-btn" id="btn-attack" data-key="KeyX">⚔️</button>
      <button class="touch-btn" id="btn-ultimate" data-key="KeyZ">★</button>
    </div>
    <button id="fs-btn">⛶</button>
  </div>
</div>
<div id="info">Fletxes/WASD: Moure · Space/W/↑: Saltar · Shift: Córrer · C: Canviar · X: Atac · Z: Ultimata · R: Reiniciar · O: Codi · Tàctil: botons a pantalla</div>
<script src="constants.js"></script>
<script src="music.js"></script>
<script src="levelgen.js"></script>
<script src="game.js"></script>
</body>
</html>
